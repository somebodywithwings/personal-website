<header class="site-header">
  <div class="container header-inner">
    <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
