{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}

{{ if .Parent.IsHome }}
{{ partial "card-grid.html" (dict "pages" .Pages.ByWeight "fallback" "images/covers/placeholder-novel.svg" "showDate" false) }}
{{ else }}
<ul class="post-list">
  {{ range .Pages.ByWeight }}
  <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
  {{ end }}
</ul>
{{ end }}
{{ end }}
